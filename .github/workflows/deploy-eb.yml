name: CI-CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-eb.yml"

env:
  AWS_REGION: us-east-1
  EB_APP_NAME: backend
  EB_ENV_NAME: online-shopping-env

jobs:
  sonar:
    name: SonarQube Cloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage

      - name: Run tests with coverage
        working-directory: backend
        run: |
          coverage run -m pytest
          coverage xml -o coverage.xml

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: backend

  deploy:
    name: Build and Deploy to Elastic Beanstalk
    needs: sonar
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity
          aws --version

      - name: CI - Python syntax check
        run: |
          python3 -m compileall backend

      - name: Build Elastic Beanstalk source bundle
        run: |
          rm -f deploy.zip
          cd backend
          zip -r ../deploy.zip . \
            -x ".venv/*" "__pycache__/*" "*.pyc" ".git/*" ".elasticbeanstalk/*"

      - name: Wait for Elastic Beanstalk environment to be Ready
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for environment to become Ready..."
          aws elasticbeanstalk wait environment-updated \
            --environment-names "$EB_ENV_NAME" \
            --region "$AWS_REGION"
          echo "Environment is Ready"

      - name: CD - Upload bundle and deploy to Elastic Beanstalk
        shell: bash
        run: |
          set -euo pipefail

          VERSION_LABEL="gh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA::7}"

          BUCKET=$(aws elasticbeanstalk create-storage-location \
            --region "$AWS_REGION" \
            --query S3Bucket \
            --output text)

          KEY="${EB_APP_NAME}/${VERSION_LABEL}.zip"

          echo "Deploying version: $VERSION_LABEL"
          echo "Using bucket: $BUCKET"
          echo "Using key: $KEY"

          aws s3 cp deploy.zip "s3://${BUCKET}/${KEY}" --region "$AWS_REGION"

          aws elasticbeanstalk create-application-version \
            --application-name "$EB_APP_NAME" \
            --version-label "$VERSION_LABEL" \
            --source-bundle S3Bucket="$BUCKET",S3Key="$KEY" \
            --region "$AWS_REGION"

          aws elasticbeanstalk update-environment \
            --environment-name "$EB_ENV_NAME" \
            --version-label "$VERSION_LABEL" \
            --region "$AWS_REGION"

          aws elasticbeanstalk wait environment-updated \
            --environment-names "$EB_ENV_NAME" \
            --region "$AWS_REGION"

          echo "Deployment completed successfully"